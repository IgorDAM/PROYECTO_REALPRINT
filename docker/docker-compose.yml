version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: realprint-mysql

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: realprint_db
      MYSQL_USER: realprint
      MYSQL_PASSWORD: realprint123
      TZ: 'America/Madrid'

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ../scripts/realprint-database-mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro

    networks:
      - realprint_network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "realprint", "-p", "realprint123"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s

    restart: unless-stopped

    command:
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=1000
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
    driver: local

networks:
  realprint_network:
    driver: bridge
