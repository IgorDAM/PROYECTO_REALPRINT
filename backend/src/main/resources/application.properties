spring.application.name=realprint-backend

# ========== DATABASE (MySQL) ==========
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/realprint_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=realprint
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ========== CONTEXT PATH ==========
server.servlet.context-path=/api

# ========== JWT ==========
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# ========== CORS ==========
cors.allowed-origins=http://localhost:5173,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# ========== FILE UPLOAD ==========
app.upload.dir=${user.home}/realprint-uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========== LOGGING ==========
logging.level.root=INFO
logging.level.com.realprint.realprintbackend=DEBUG

# ========== SWAGGER (IMPORTANTE) ==========
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui