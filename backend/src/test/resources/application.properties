spring.application.name=realprint-backend-test
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=10485760
spring.servlet.multipart.max-request-size=12582912
server.port=0
logging.level.root=WARN
logging.level.com.realprint=DEBUG
logging.level.org.springframework.boot.test=DEBUG
jwt.secret=test-secret-key-for-testing
jwt.expiration-ms=86400000
app.upload.dir=/tmp/uploads-test
app.upload.max-size=10485760
