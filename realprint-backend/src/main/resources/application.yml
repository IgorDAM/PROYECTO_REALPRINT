server:
  port: 8080
  servlet:
    context-path: /api
spring:
  application:
    name: realprint-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    url: jdbc:h2:mem:realprint;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    org.hibernate.SQL: debug
jwt:
  # Clave larga para HMAC SHA-256 (minimo 32 chars)
  secret: "realprint-secret-key-dev-2026-super-larga-para-hs256"
  expiration-ms: 86400000
app:
  upload:
    dir: uploads
