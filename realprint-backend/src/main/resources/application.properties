spring.application.name=realprint-backend

# ========== DATABASE CONFIGURATION - MySQL ==========
# Conexión a MySQL (cambiar usuario/contraseña según tu instalación)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/realprint_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=realprint
spring.datasource.password=realprint123

# JPA Configuration para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ========== JWT CONFIGURATION ==========
# Clave secreta para firmar tokens JWT (cambiar en producción)
jwt.secret=tuClaveSecretaMuyLargaYSeguraParaProduccion1234567890ABCDEFGHIJKLMNOP
jwt.expiration-ms=86400000

# ========== CORS CONFIGURATION ==========
# Para permitir requests desde Vite en localhost:5173
cors.allowed-origins=http://localhost:5173,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# ========== FILE UPLOAD CONFIGURATION ==========
# Directorio donde se guardan los archivos subidos
file.upload.dir=${user.home}/realprint-uploads

# Tamaño máximo de archivo permitido: 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========== LOGGING CONFIGURATION ==========
logging.level.root=INFO
logging.level.com.realprint.realprintbackend=DEBUG

