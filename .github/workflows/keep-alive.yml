name: Keep Backend Alive

# Keep-alive intercalado con UptimeRobot.
# UptimeRobot hace ping cada 5 minutos; este workflow se desfasará para cubrir huecos.
on:
  schedule:
    # Pings desfasados: 02, 07, 12, 17... y 07, 12, 17, 22...
    - cron: '2-59/10 * * * *'
    - cron: '7-59/10 * * * *'

  # Permitir ejecución manual desde GitHub Actions UI
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest

    env:
      HEALTH_URL: https://proyecto-realprint.onrender.com/api/health

    steps:
      - name: Ping backend health endpoint
        shell: bash
        run: |
          set -u

          echo "🏓 Keep-alive backend: $HEALTH_URL"
          start_ts=$(date +%s)

          ping_backend() {
            local attempt="$1"
            local timeout="$2"

            echo "🔄 Intento ${attempt}/3 (timeout: ${timeout}s)..."

            response=$(curl -sS -w $'\n%{http_code}' --max-time "$timeout" "$HEALTH_URL" || true)
            http_code=$(printf '%s\n' "$response" | tail -n1)
            body=$(printf '%s\n' "$response" | sed '$d')

            echo "📊 Código HTTP: ${http_code:-sin_respuesta}"

            if [ "$http_code" = "200" ]; then
              echo "📄 Respuesta: $body"
              return 0
            fi

            echo "⚠️ Intento ${attempt} falló"
            return 1
          }

          if ping_backend 1 120; then
            end_ts=$(date +%s)
            echo "✅ Keep-alive exitoso"
            echo "⏱️ Tiempo total: $((end_ts - start_ts))s"
            echo "🕒 Finalizado: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            exit 0
          fi

          echo "⏳ Esperando 10s antes del segundo intento..."
          sleep 10

          if ping_backend 2 90; then
            end_ts=$(date +%s)
            echo "✅ Keep-alive exitoso"
            echo "⏱️ Tiempo total: $((end_ts - start_ts))s"
            echo "🕒 Finalizado: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            exit 0
          fi

          echo "⏳ Esperando 10s antes del tercer intento..."
          sleep 10

          if ping_backend 3 60; then
            end_ts=$(date +%s)
            echo "✅ Keep-alive exitoso"
            echo "⏱️ Tiempo total: $((end_ts - start_ts))s"
            echo "🕒 Finalizado: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            exit 0
          fi

          end_ts=$(date +%s)
          echo "❌ Todos los intentos fallaron"
          echo "⏱️ Tiempo total: $((end_ts - start_ts))s"
          echo "🕒 Finalizado: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          exit 1

      - name: Registro de ejecución
        if: always()
        run: |
          echo "⏰ Última ejecución: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🔄 Siguiente ejecución: cron intercalado con UptimeRobot"

      # Opcional: Notificar si falla
      - name: Notificar fallo
        if: failure()
        run: |
          echo "❌ El backend no respondió correctamente"
          echo "🔍 Revisa los logs en Render: https://dashboard.render.com/"
