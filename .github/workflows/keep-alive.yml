name: Keep Backend Alive

# Ejecutar cada 10 minutos para evitar cold start de Render
on:
  schedule:
    # Cada 10 minutos (cron: minuto hora día mes día-semana)
    - cron: '*/10 * * * *'

  # Permitir ejecución manual desde GitHub Actions UI
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Ping backend health endpoint
        run: |
          echo "🏓 Haciendo ping al backend..."

          # Función para hacer ping
          ping_backend() {
            local timeout=$1
            local attempt=$2

            echo "🔄 Intento $attempt (timeout: ${timeout}s)..."
            response=$(curl -s -w "\n%{http_code}" --max-time $timeout \
              https://proyecto-realprint.onrender.com/api/actuator/health 2>&1)

            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | head -n-1)

            echo "📊 Código HTTP: $http_code"

            if [ "$http_code" = "200" ]; then
              echo "📄 Respuesta: $body"
              echo "✅ Backend está funcionando correctamente"
              return 0
            else
              echo "⚠️ Intento $attempt falló (código: $http_code)"
              return 1
            fi
          }

          # Intento 1: timeout largo para cold start
          if ping_backend 120 1; then
            exit 0
          fi

          echo "⏳ Esperando 10s antes del siguiente intento..."
          sleep 10

          # Intento 2: timeout medio
          if ping_backend 90 2; then
            exit 0
          fi

          echo "⏳ Esperando 10s antes del último intento..."
          sleep 10

          # Intento 3: último intento
          if ping_backend 60 3; then
            exit 0
          fi

          echo "❌ Todos los intentos fallaron"
          exit 1

      - name: Registro de ejecución
        if: always()
        run: |
          echo "⏰ Última ejecución: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🔄 Próxima ejecución: en ~10 minutos"

      # Opcional: Notificar si falla
      - name: Notificar fallo
        if: failure()
        run: |
          echo "❌ El backend no respondió correctamente"
          echo "🔍 Revisa los logs en Render: https://dashboard.render.com/"
